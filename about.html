        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

          <li class="nav-item"><a class="nav-link" href="committee.html">Committee</a></li>

          <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ===== Header ===== -->

  <!-- ===== Footer (as in index) ===== -->

    <div class="container d-flex justify-content-between flex-wrap gap-2">
      <small>© <span id="year"></span> ಬಾಂಧವ್ಯ ಬೆಂಗಳೂರು. ಎಲ್ಲಾ ಹಕ್ಕುಗಳು ಕಾಯ್ದಿರಿಸಲಾಗಿದೆ.</small>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Active-state + mobile auto-close (fixed) -->
  <script>
    // Footer year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Active nav: handle index.html and #contact consistently
    (function () {
      const current = location.pathname.split('/').pop() || 'about.html';
      document.querySelectorAll('.navbar .nav-link').forEach(a => {
        const href = a.getAttribute('href');
        const isExact = (href === current);
        const isHomeContact = (current === 'index.html' && location.hash === '#contact' && href === 'index.html#contact');
        if (isExact || isHomeContact) a.classList.add('active');
      });
    })();

    // Auto-close navbar on mobile after click
    document.querySelectorAll('.navbar .nav-link').forEach(link => {
      link.addEventListener('click', () => {
        const nav = document.getElementById('mainNav');
        if (!nav || typeof bootstrap === 'undefined') return;
        const bs = bootstrap.Collapse.getInstance(nav);
        if (bs && nav.classList.contains('show')) bs.hide();
      });
    });
  </script>
</body>
</html>
